name: Release

# Cria a tag `vX.Y.Z` e a GitHub Release correspondente à versão do package.json
# sempre que ela ainda não existir. Roda no runner do GitHub (não passa pelo proxy
# de git local), então consegue publicar refs/tags que o ambiente de dev não consegue.
# Idempotente: se a tag já existe, não faz nada.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-release:
    name: tag + release (se faltando)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ler versão do package.json
        id: v
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Criar tag + release se ainda não existir
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          TAG="v$VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG já existe no remoto — nada a fazer."
            exit 0
          fi

          # Extrai a seção do CHANGELOG para esta versão (entre '## [X.Y.Z]' e o próximo '## [').
          NOTES=$(awk -v ver="[$VERSION]" '
            $0 ~ "^## " && index($0, ver) { grab=1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md)
          [ -z "$NOTES" ] && NOTES="Release $TAG. Ver CHANGELOG.md."

          # gh release create cria a TAG (em $GITHUB_SHA) e a Release de uma vez.
          printf '%s\n' "$NOTES" | gh release create "$TAG" \
            --title "$TAG" \
            --target "$GITHUB_SHA" \
            --notes-file -
          echo "Release $TAG criada."

  npm-publish:
    name: publicar no npm (se houver NPM_TOKEN)
    needs: tag-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Só publica se o secret NPM_TOKEN estiver configurado no repositório.
      # Sem token → o job termina como no-op (não falha). Ver docs/PUBLISH.md.
      - name: Checar se há NPM_TOKEN
        id: gate
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Sem secret NPM_TOKEN — pulando publicação no npm."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.publish == 'true'
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Instalar + build
        if: steps.gate.outputs.publish == 'true'
        run: npm install && npm run build

      - name: Publicar se a versão ainda não estiver no npm
        if: steps.gate.outputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION já está publicado — nada a fazer."
          else
            npm publish --access public
            echo "Publicado $NAME@$VERSION no npm."
          fi
