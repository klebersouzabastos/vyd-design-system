name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela execuções antigas do mesmo ref quando um novo push chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # Gate obrigatório e DETERMINÍSTICO: contrato de tokens + build + tipos.
  # Sem browser, sem flake. É o que protege os apps que consomem o sistema.
  # ---------------------------------------------------------------------
  build:
    name: build · verify · typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm install
      - name: Build (tokens + ícones)
        run: npm run build
      - name: Verify (contrato --vyd-* + temas)
        run: npm run verify
      - name: Typecheck (vyd-react)
        run: npm run typecheck
      - name: Git limpo (artefatos gerados commitados)
        run: git diff --exit-code -- dist react/src/icons.generated.ts || (echo "::error::Artefatos gerados divergem do commit. Rode 'npm run build' e commite dist/ + react/src/icons.generated.ts." && exit 1)

  # ---------------------------------------------------------------------
  # Regressão visual (Playwright) — GATE. Compara contra as baselines
  # commitadas em test/__screenshots__/ (geradas SEMPRE pelo runner de CI —
  # ver .github/workflows/update-baselines.yml e docs/TESTING.md).
  # Enquanto não houver baselines commitadas, o passo é pulado (bootstrap).
  # ---------------------------------------------------------------------
  visual:
    name: regressão visual
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checar baselines
        id: base
        run: |
          if [ -d test/__screenshots__ ] && [ -n "$(ls -A test/__screenshots__ 2>/dev/null)" ]; then
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Sem baselines em test/__screenshots__ — rode o workflow update-baselines (push numa branch baselines/*)."
          fi
      - uses: actions/setup-node@v4
        if: steps.base.outputs.have == 'true'
        with:
          node-version: 20
      - if: steps.base.outputs.have == 'true'
        run: npm install
      - if: steps.base.outputs.have == 'true'
        run: npm run build
      - name: Instalar Playwright + Chromium
        if: steps.base.outputs.have == 'true'
        run: npx --yes playwright install --with-deps chromium
      - name: Comparar contra baselines (gate)
        if: steps.base.outputs.have == 'true'
        run: npm run test:visual
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diffs
          path: test-results/
          if-no-files-found: warn

  # ---------------------------------------------------------------------
  # Testes unitários dos componentes React (Vitest + Testing Library).
  # GATE: teclado/ARIA de Menu, Tabs, CmdK, Ribbon, Field, Dialog.
  # ---------------------------------------------------------------------
  unit:
    name: unit (vitest · vyd-react)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Vitest
        run: npm test --workspace react

  # ---------------------------------------------------------------------
  # Acessibilidade automatizada (axe-core sobre demo/ nos 3 temas).
  # GATE desde a 3.1.0: zero violações serious/critical.
  # ---------------------------------------------------------------------
  a11y:
    name: axe (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - name: Instalar Playwright + Chromium
        run: npx --yes playwright install --with-deps chromium
      - name: Rodar axe (gate)
        run: npm run test:a11y
