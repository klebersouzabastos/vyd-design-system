name: Update visual baselines

# Regenera as baselines de regressão visual NO RUNNER DE CI (a única origem
# válida — renderização de fonte difere entre máquinas; ver docs/TESTING.md)
# e commita os PNGs de volta na própria branch.
#
# Como usar (funciona até de ambientes sem acesso à API do GitHub):
#   git checkout -b baselines/minha-atualizacao && git push -u origin HEAD
#   → o workflow roda, commita test/__screenshots__/ na branch
#   → git pull e merge na main (revisando o diff visual intencional)
# Também aceita workflow_dispatch pela UI do GitHub.

on:
  push:
    branches: ['baselines/**']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: baselines-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - name: Instalar Playwright + Chromium
        run: npx --yes playwright install --with-deps chromium
      - name: Regenerar baselines
        run: npm run test:visual:update
      - name: Commitar baselines na branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f test/__screenshots__
          if git diff --cached --quiet; then
            echo "Baselines já atualizadas — nada a commitar."
            exit 0
          fi
          git commit -m "test(visual): regenera baselines no runner de CI [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
