<!doctype html>
<html lang="pt-BR" data-vyd-theme="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>VYD — Overlays</title>
<link rel="stylesheet" href="../dist/theme.css">
<style>
  body { background: var(--vyd-bg-chrome); padding: 32px; }
  .wrap { max-width: 940px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  .panel { background: var(--vyd-bg-panel); border: 1px solid var(--vyd-border-default); border-radius: var(--vyd-radius-md); padding: 18px; }
  .panel h2 { margin: 0 0 16px; }
  .row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  /* posiciona dialog/menu/popover inline p/ o screenshot (em uso real: showModal / fixed) */
  .static-dialog { position: static; display: block; }
  .static-float { position: static; display: inline-block; }
  .force-tip { opacity: 1 !important; position: static; transform: none; margin-bottom: 6px; display: inline-block; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="vyd-icon-alert-triangle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l10 18H2L12 3z"/><path d="M12 10v5"/><path d="M12 18h.01"/></symbol>
  <symbol id="vyd-icon-angle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16"/><path d="M4 20L17 6"/><path d="M4 13a9 9 0 0 1 7 7"/></symbol>
  <symbol id="vyd-icon-bell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6z"/><path d="M10 20a2 2 0 0 0 4 0"/></symbol>
  <symbol id="vyd-icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></symbol>
  <symbol id="vyd-icon-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></symbol>
  <symbol id="vyd-icon-chevron-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></symbol>
  <symbol id="vyd-icon-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></symbol>
  <symbol id="vyd-icon-chevron-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15l6-6 6 6"/></symbol>
  <symbol id="vyd-icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></symbol>
  <symbol id="vyd-icon-column" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="4" width="6" height="16"/><path d="M7 4h10M7 20h10"/></symbol>
  <symbol id="vyd-icon-cube" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 12v9M4 7.5l8 4.5 8-4.5"/></symbol>
  <symbol id="vyd-icon-dimension" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18"/><path d="M3 8v8M21 8v8"/></symbol>
  <symbol id="vyd-icon-document" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18"/><path d="M8 8h8M8 12h8M8 16h5"/></symbol>
  <symbol id="vyd-icon-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5"/><path d="M4 21h16"/></symbol>
  <symbol id="vyd-icon-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h4L18.5 9.5l-4-4L4 16v4z"/><path d="M13.5 6.5l4 4"/></symbol>
  <symbol id="vyd-icon-export" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14v6h16v-6"/><path d="M12 3v11M8 7l4-4 4 4"/></symbol>
  <symbol id="vyd-icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></symbol>
  <symbol id="vyd-icon-filter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h18l-7 8v6l-4-2v-4L3 5z"/></symbol>
  <symbol id="vyd-icon-folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h6l2 2h10v11H3z"/></symbol>
  <symbol id="vyd-icon-grid" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></symbol>
  <symbol id="vyd-icon-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11l8-7 8 7"/><path d="M6 10v10h12V10"/></symbol>
  <symbol id="vyd-icon-info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><path d="M12 8h.01"/></symbol>
  <symbol id="vyd-icon-layers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/></symbol>
  <symbol id="vyd-icon-levels" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l9-4 9 4-9 4-9-4z"/><path d="M3 13l9 4 9-4"/><path d="M3 17.5l9 4 9-4"/></symbol>
  <symbol id="vyd-icon-measure" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="8" width="20" height="8" rx="1"/><path d="M6 8v3M10 8v4M14 8v3M18 8v4"/></symbol>
  <symbol id="vyd-icon-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></symbol>
  <symbol id="vyd-icon-minus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></symbol>
  <symbol id="vyd-icon-model" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18"/><path d="M3 9h18M9 9v12"/></symbol>
  <symbol id="vyd-icon-modules" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></symbol>
  <symbol id="vyd-icon-more" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="19" cy="12" r="1.4" fill="currentColor" stroke="none"/></symbol>
  <symbol id="vyd-icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></symbol>
  <symbol id="vyd-icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></symbol>
  <symbol id="vyd-icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.1 5.1l2.1 2.1M16.8 16.8l2.1 2.1M18.9 5.1l-2.1 2.1M7.2 16.8l-2.1 2.1"/></symbol>
  <symbol id="vyd-icon-sheet" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l4 4v14H6z"/><path d="M15 3v4h4"/></symbol>
  <symbol id="vyd-icon-slab" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9l10-5 10 5-10 5L2 9z"/><path d="M2 9v3l10 5 10-5V9"/></symbol>
  <symbol id="vyd-icon-structure" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V8l8-5 8 5v12"/><path d="M9 20v-6h6v6"/></symbol>
  <symbol id="vyd-icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></symbol>
  <symbol id="vyd-icon-view-2d" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14"/><path d="M7 5v14M3 12h18"/></symbol>
  <symbol id="vyd-icon-view-3d" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 12v9M4 7.5l8 4.5 8-4.5"/></symbol>
  <symbol id="vyd-icon-wall" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12"/><path d="M3 12h18M9 6v6M15 12v6"/></symbol>
</svg>
<div class="wrap">
  <div class="panel" style="grid-column:1/-1"><h2 class="vyd-title">Overlays · v0.7.0</h2></div>

  <div class="panel">
    <h2 class="vyd-heading">Dialog / Modal</h2>
    <dialog class="vyd-dialog static-dialog" open>
      <div class="vyd-dialog__head">
        <span class="vyd-dialog__title">Gerar memorial</span>
        <button class="vyd-dialog__close" aria-label="Fechar"><svg class="vyd-icon"><use href="#vyd-icon-close"/></svg></button>
      </div>
      <div class="vyd-dialog__body vyd-body" style="color:var(--vyd-text-secondary)">
        Confirma a geração do memorial descritivo para <b style="color:var(--vyd-text-primary)">VYD-OBR-0421</b>? Isso pode levar alguns segundos.
      </div>
      <div class="vyd-dialog__foot">
        <button class="vyd-btn vyd-btn--ghost">Cancelar</button>
        <button class="vyd-btn">Gerar</button>
      </div>
    </dialog>
  </div>

  <div class="panel">
    <h2 class="vyd-heading">Menu / Dropdown</h2>
    <div class="vyd-menu static-float" role="menu" style="min-width:220px">
      <div class="vyd-menu__label">Ações</div>
      <button class="vyd-menu__item" role="menuitem"><svg class="vyd-icon vyd-icon--sm"><use href="#vyd-icon-edit"/></svg> Editar</button>
      <button class="vyd-menu__item" role="menuitem"><svg class="vyd-icon vyd-icon--sm"><use href="#vyd-icon-download"/></svg> Exportar</button>
      <button class="vyd-menu__item" role="menuitem"><svg class="vyd-icon vyd-icon--sm"><use href="#vyd-icon-eye"/></svg> Visualizar</button>
      <div class="vyd-menu__sep"></div>
      <button class="vyd-menu__item vyd-menu__item--danger" role="menuitem"><svg class="vyd-icon vyd-icon--sm"><use href="#vyd-icon-close"/></svg> Excluir</button>
      <button class="vyd-menu__item" role="menuitem" disabled>Indisponível</button>
    </div>

    <h2 class="vyd-heading" style="margin-top:20px">Popover</h2>
    <div class="vyd-popover static-float">
      <div class="vyd-subheading" style="margin-bottom:6px">Filtro rápido</div>
      <label class="vyd-choice" style="margin-bottom:6px"><input type="checkbox" class="vyd-checkbox" checked> Aprovados</label><br>
      <label class="vyd-choice"><input type="checkbox" class="vyd-checkbox"> Pendentes</label>
    </div>
  </div>

  <div class="panel">
    <h2 class="vyd-heading">Tooltip · Toolbar</h2>
    <div class="row" style="align-items:center">
      <span class="vyd-tooltip-wrap"><span class="vyd-tooltip force-tip" role="tooltip">Medir distância</span></span>
      <span class="vyd-tooltip-wrap"><button class="vyd-btn vyd-btn--ghost">passe o mouse</button><span class="vyd-tooltip" role="tooltip">Tooltip on hover</span></span>
    </div>
    <div class="vyd-toolbar" style="margin-top:16px">
      <button class="vyd-btn vyd-btn--ghost vyd-btn--sm" aria-label="Ação"><svg class="vyd-icon vyd-icon--sm"><use href="#vyd-icon-model"/></svg></button>
      <button class="vyd-btn vyd-btn--ghost vyd-btn--sm" aria-label="Ação"><svg class="vyd-icon vyd-icon--sm"><use href="#vyd-icon-measure"/></svg></button>
      <span class="vyd-toolbar__sep"></span>
      <button class="vyd-btn vyd-btn--ghost vyd-btn--sm" aria-label="Ação"><svg class="vyd-icon vyd-icon--sm"><use href="#vyd-icon-eye"/></svg></button>
      <button class="vyd-btn vyd-btn--ghost vyd-btn--sm" aria-label="Ação"><svg class="vyd-icon vyd-icon--sm"><use href="#vyd-icon-settings"/></svg></button>
    </div>
  </div>

  <div class="panel">
    <h2 class="vyd-heading">Drawer (superfície)</h2>
    <dialog class="vyd-dialog vyd-drawer static-dialog" open style="height:auto;width:320px">
      <div class="vyd-dialog__head"><span class="vyd-dialog__title">Propriedades</span><button class="vyd-dialog__close" aria-label="Fechar"><svg class="vyd-icon"><use href="#vyd-icon-close"/></svg></button></div>
      <div class="vyd-dialog__body">
        <div class="vyd-field"><label class="vyd-field__label" for="ov-secao">Seção</label><input id="ov-secao" class="vyd-input vyd-mono" value="30×60"></div>
      </div>
    </dialog>
  </div>
</div>
<script src="demo.js"></script>
</body>
</html>
