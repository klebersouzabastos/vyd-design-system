<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">VYD logo lockup</title>
  <desc id="d">Lockup VYD: símbolo (cubo isométrico — export oficial do brand guide) + monograma. Wordmark em Inter Tight; converter para outlines na versão final de distribuição.</desc>
  <!-- Símbolo (export oficial): coords 0–32 escaladas ×3 → 96px de altura -->
  <g transform="translate(4 12) scale(3)">
    <path d="M16 3 L28 10 L28 22 L16 29 L4 22 L4 10 Z" fill="none" stroke="#6B9CE0" stroke-width="0.5" stroke-linejoin="miter"/>
    <path d="M16 3 L28 10 L16 16 L4 10 Z" fill="#1E5FC4"/>
    <path d="M16 16 L16 29 M16 16 L28 10 M16 16 L4 10" fill="none" stroke="#3A4350" stroke-width="0.33"/>
  </g>
  <!-- Wordmark -->
  <text x="116" y="74" font-family="'Inter Tight', system-ui, sans-serif" font-weight="700" font-size="58" letter-spacing="-1.5" fill="#E1E6EB">VYD</text>
  <text x="118" y="94" font-family="'JetBrains Mono', monospace" font-weight="500" font-size="9" letter-spacing="2" fill="#7B8794">ENGINEERING SOFTWARE ECOSYSTEM</text>
</svg>
