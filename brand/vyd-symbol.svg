<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">VYD symbol</title>
  <desc id="d">Cubo isométrico VYD (aproximação do símbolo selecionado — substituir pelo export oficial). Cores derivadas dos tokens --vyd-blueprint-*.</desc>
  <!-- Top face (face-topo, destaque) : blueprint-400 -->
  <path d="M60 24 L89.4 41 L60 58 L30.6 41 Z" fill="#3E7BD4"/>
  <!-- Left face : blueprint-500 (primária) -->
  <path d="M30.6 41 L60 58 L60 92 L30.6 75 Z" fill="#1E5FC4"/>
  <!-- Right face : blueprint-700 (profundidade) -->
  <path d="M89.4 41 L89.4 75 L60 92 L60 58 Z" fill="#143F86"/>
  <!-- Technical edges : blueprint-300, linha fina -->
  <g stroke="#6B9CE0" stroke-width="1.5" stroke-linejoin="miter">
    <path d="M60 24 L89.4 41 L89.4 75 L60 92 L30.6 75 L30.6 41 Z"/>
    <path d="M60 24 L60 58 M30.6 41 L60 58 L89.4 41"/>
  </g>
</svg>
