<svg width="120" height="120" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">VYD symbol</title>
  <desc id="d">Cubo isométrico VYD — export oficial do brand guide (face-topo destacada, módulo 3D / BIM-volume). Arestas externas blueprint-300, face-topo blueprint-500, arestas internas neutral-300.</desc>
